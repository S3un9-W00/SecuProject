<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임 진행 중 - 미로찾기</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .maze-text {
            font-family: 'Courier New', monospace;
            white-space: pre;
            background: #1a1a1a;
            color: #00ff00;
            padding: 20px;
            border-radius: 5px;
            font-size: 18px;
            line-height: 1.2;
        }
        .game-info {
            margin: 20px 0;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
        }
        .message-box {
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            background: #fff;
            border: 1px solid #e2e8f0;
            color: #334155;
            min-height: 42px;
        }
        .legend {
            margin-top: 12px;
            font-size: 0.95em;
            color: #475569;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-header">
            <h1>🎮 미로찾기 게임</h1>
            <div class="game-info">
                <p><strong>플레이어 위치:</strong> (<span th:text="${status.playerX}">0</span>, <span th:text="${status.playerY}">0</span>)</p>
                <p><strong>AI 위치:</strong> (<span th:text="${status.enemyX}">0</span>, <span th:text="${status.enemyY}">0</span>)</p>
                <p th:if="${status.gameFinished}" style="color: green; font-weight: bold;">✓ 게임 완료!</p>
                <p th:unless="${status.gameFinished}" style="color: blue;">진행 중...</p>
                <div class="message-box" id="messageBox">이동/아이템/함정 결과 메시지가 여기에 표시됩니다.</div>
                <div th:if="${status.gameFinished}" style="margin-top: 10px;">
                    <a class="btn btn-secondary" href="/replay" style="text-decoration:none;">리플레이 보기</a>
                </div>
                <div class="legend">
                    <strong>범례</strong>:
                    P=플레이어, E=AI, #=벽, .=길, G=도착,
                    F=횃불(10초 5×5 시야), H=망치(벽 1회 파괴), X=함정(3초 이동 불가)
                </div>
            </div>
        </div>
        
        <div class="game-container">
            <div class="maze-container">
                <div class="maze-text" th:text="${status.mazeView}">
                    <!-- 미로가 텍스트로 표시됩니다 -->
                </div>
            </div>
            
            <div class="controls-panel">
                <h3>조작</h3>
                <div class="control-buttons">
                    <button class="btn-direction" onclick="move('w')">↑ 위 (W)</button>
                    <div class="horizontal-buttons">
                        <button class="btn-direction" onclick="move('a')">← 왼쪽 (A)</button>
                        <button class="btn-direction" onclick="move('s')">↓ 아래 (S)</button>
                        <button class="btn-direction" onclick="move('d')">→ 오른쪽 (D)</button>
                    </div>
                </div>
                <div class="keyboard-hint">
                    <small>키보드: WASD 사용</small>
                </div>
                
                <div class="game-actions">
                    <form th:action="@{/game/reset}" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-danger">게임 종료</button>
                    </form>
                </div>
            </div>
        </div>
        
        <div class="game-over-modal" id="gameOverModal" style="display: none;">
            <div class="modal-content">
                <h2>🎉 게임 완료!</h2>
                <p>도착지점에 도달했습니다!</p>
                <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top: 10px;">
                    <a class="btn btn-secondary" href="/replay" style="text-decoration:none;">리플레이 보기</a>
                    <form th:action="@{/game/reset}" method="post" style="margin:0;">
                        <button type="submit" class="btn btn-primary">새 게임 시작</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script th:inline="javascript">
        // 이동 함수
        function move(direction) {
            fetch('/game/move', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'direction=' + direction
            })
            .then(response => response.json())
            .then(data => {
                const messageBox = document.getElementById('messageBox');
                if (messageBox) {
                    messageBox.textContent = data.message || '...';
                }

                // 미로 텍스트 업데이트
                const mazeText = document.querySelector('.maze-text');
                if (mazeText && data.mazeView) {
                    mazeText.textContent = data.mazeView;
                }

                // 플레이어 위치 업데이트
                if (data.playerX !== undefined) {
                    const playerXSpan = document.querySelector('.game-info p:nth-child(1) span:nth-child(1)');
                    const playerYSpan = document.querySelector('.game-info p:nth-child(1) span:nth-child(2)');
                    if (playerXSpan) playerXSpan.textContent = data.playerX;
                    if (playerYSpan) playerYSpan.textContent = data.playerY;
                }

                // AI 위치 업데이트
                if (data.enemyX !== undefined) {
                    const enemyXSpan = document.querySelector('.game-info p:nth-child(2) span:nth-child(1)');
                    const enemyYSpan = document.querySelector('.game-info p:nth-child(2) span:nth-child(2)');
                    if (enemyXSpan) enemyXSpan.textContent = data.enemyX;
                    if (enemyYSpan) enemyYSpan.textContent = data.enemyY;
                }

                // 도착 처리
                if (data.arrived || data.playerArrived || data.enemyArrived) {
                    // 이동 버튼 비활성화
                    document.querySelectorAll('.btn-direction').forEach(btn => btn.disabled = true);
                    
                    if (data.gameFinished) {
                        // 둘 다 도착: 게임 종료 modal
                        const gameOverModal = document.getElementById('gameOverModal');
                        if (gameOverModal) {
                            gameOverModal.style.display = 'flex';
                        }
                    } else {
                        // 한 명만 도착: 아래에 통과 메시지
                        let passMessage = "";
                        if (data.playerArrived && !data.enemyArrived) {
                            passMessage = "🎯 플레이어 통과!";
                        } else if (data.enemyArrived && !data.playerArrived) {
                            passMessage = "🤖 AI 통과!";
                        }
                        if (passMessage && messageBox) {
                            messageBox.textContent = passMessage;
                            messageBox.style.background = "#fff3cd";
                            messageBox.style.borderColor = "#ffc107";
                        }
                    }
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('오류가 발생했습니다.');
            });
        }
        
        // 키보드 이벤트
        document.addEventListener('keydown', function(e) {
            const key = e.key.toLowerCase();
            if (key === 'w' || e.key === 'ArrowUp') {
                e.preventDefault();
                move('w');
            } else if (key === 's' || e.key === 'ArrowDown') {
                e.preventDefault();
                move('s');
            } else if (key === 'a' || e.key === 'ArrowLeft') {
                e.preventDefault();
                move('a');
            } else if (key === 'd' || e.key === 'ArrowRight') {
                e.preventDefault();
                move('d');
            }
        });
        
        // AI 자동 이동 (정확한 0.5초 간격)
        let aiMoveInterval = null;
        let lastAiMoveTime = Date.now();
        const AI_MOVE_INTERVAL = 500; // 0.5초
        
        function scheduleNextAiMove() {
            const now = Date.now();
            const elapsed = now - lastAiMoveTime;
            const delay = Math.max(0, AI_MOVE_INTERVAL - elapsed);
            
            aiMoveInterval = setTimeout(function() {
                lastAiMoveTime = Date.now();
                
                fetch('/game/ai-move', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // 도착 처리
                        if (data.enemyArrived || data.playerArrived) {
                            // AI 이동 중단
                            if (aiMoveInterval) {
                                clearTimeout(aiMoveInterval);
                            }
                            
                            // 플레이어만 도착: 버튼 비활성화
                            // Enemy만 도착: 버튼 활성화 (플레이어가 이동할 수 있게)
                            if (data.playerArrived && !data.enemyArrived) {
                                document.querySelectorAll('.btn-direction').forEach(btn => btn.disabled = true);
                            }
                            
                            if (!data.playerArrived) {
                                // AI만 통과: 메시지 표시, 게임 계속
                                const messageBox = document.getElementById('messageBox');
                                if (messageBox) {
                                    messageBox.textContent = "🤖 AI 통과!";
                                    messageBox.style.background = "#fff3cd";
                                    messageBox.style.borderColor = "#ffc107";
                                }
                            }
                            
                            if (data.gameFinished) {
                                location.reload();
                            }
                            // 플레이어만 도착: AI 계속 이동해야 함 (return 안 함)
                            // Enemy만 도착: 아래에서 처리
                            if (!data.playerArrived && data.enemyArrived && !data.gameFinished) {
                                return;
                            }
                        }
                        
                        // 게임이 끝났으면 (둘 다 도착) 페이지 새로고침
                        if (data.gameFinished) {
                            if (aiMoveInterval) {
                                clearTimeout(aiMoveInterval);
                            }
                            location.reload();
                        } else {
                            // 미로 텍스트 업데이트
                            const mazeText = document.querySelector('.maze-text');
                            if (mazeText && data.mazeView) {
                                mazeText.textContent = data.mazeView;
                            }
                            // 위치 정보 업데이트
                            if (data.enemyX !== undefined) {
                                const enemyXSpan = document.querySelector('.game-info p:nth-child(2) span:nth-child(1)');
                                const enemyYSpan = document.querySelector('.game-info p:nth-child(2) span:nth-child(2)');
                                if (enemyXSpan) enemyXSpan.textContent = data.enemyX;
                                if (enemyYSpan) enemyYSpan.textContent = data.enemyY;
                            }
                        }
                    }
                    // 다음 이동 스케줄링 (요청 완료 후)
                    // Enemy 도착 시에만 중단 (플레이어 도착 시엔 AI 계속 이동)
                    if (!data.gameFinished && !data.enemyArrived) {
                        scheduleNextAiMove();
                    }
                })
                .catch(error => {
                    console.error('AI Move Error:', error);
                    // 에러 발생 시에도 다음 이동 스케줄링
                    scheduleNextAiMove();
                });
            }, delay);
        }
        
        // AI 이동 시작
        scheduleNextAiMove();
        
        // 게임 완료 확인
        const gameFinished = /*[[${status.gameFinished}]]*/ false;
        if (gameFinished) {
            const gameOverModal = document.getElementById('gameOverModal');
            if (gameOverModal) {
                gameOverModal.style.display = 'flex';
            }
            if (aiMoveInterval) {
                clearTimeout(aiMoveInterval);
            }
        }
        
        // 페이지를 떠날 때 타이머 정리
        window.addEventListener('beforeunload', function() {
            if (aiMoveInterval) {
                clearTimeout(aiMoveInterval);
            }
        });
    </script>
</body>
</html>
